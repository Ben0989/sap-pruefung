<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SAP Prüfungsgenerator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>SAP Prüfungsgenerator</h1>

</header>

<main>

<div class="questionBox">

    <div class="top">

        <input
            id="studentName"
            type="text"
            placeholder="Name des Prüflings">

        <div id="counter">

            Frage 0 / 15

        </div>

    </div>

    <h3 id="category"></h3>

    <div
        id="situation"
        class="situation"
        style="display:none;">
    </div>

    <h2 id="question"></h2>

    <div id="checkboxes"></div>

</div>

<div class="navigation">

    <button
        id="startBtn"
        onclick="startExam()">

        Neue SAP

    </button>
    
    <button id="savedBtn" onclick="showSavedExams()">
    Gespeicherte SAPs
    </button>
    
    <button
        id="backBtn"
        onclick="previousQuestion()"
        disabled>

        ← Zurück

    </button>

    <button
        id="nextBtn"
        onclick="nextQuestion()"
        disabled>

        Weiter →

    </button>

</div>

<div id="savedExams" style="display:none;">

    <h2>Gespeicherte SAPs</h2>

    <div id="savedExamList"></div>

    <br>

    <button onclick="hideSavedExams()">
        Zurück
    </button>

    <button onclick="deleteAllExams()">
        Alle löschen
    </button>

</div>

</main>

<script src="questions.js"></script>
<script src="generator.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>

</body>

</html>
