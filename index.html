<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Prüfungsgenerator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <h1>SAP Prüfungsgenerator</h1>

</header>

<main>

    <!-- Startseite -->
    <section id="home" class="page active">

        <button id="newExamBtn">
            Neue SAP erstellen
        </button>

        <button id="savedBtn">
            Gespeicherte SAPs
        </button>

        <button id="statsBtn">
            Statistik
        </button>

    </section>

    <!-- Prüfung -->
    <section id="exam" class="page">

        <div class="top">

            <input
                id="studentName"
                type="text"
                placeholder="Name des Prüflings">

            <div id="progress">
                Frage 1 / 15
            </div>

        </div>

        <div class="questionBox">

            <h2 id="questionTitle">

            </h2>

            <div id="answers">

            </div>

        </div>

        <div class="navigation">

            <button id="backBtn">
                ← Zurück
            </button>

            <button id="nextBtn">
                Weiter →
            </button>

        </div>

    </section>

    <!-- Ergebnis -->
    <section id="result" class="page">

        <h2>Ergebnis</h2>

        <div class="resultBox">

            <p>
                Punkte:
                <span id="points">
                    0 / 0
                </span>
            </p>

            <p>
                Prozent:
                <span id="percent">
                    0 %
                </span>
            </p>

            <h3 id="passed">

            </h3>

        </div>

        <button id="finishBtn">

            Zur Startseite

        </button>

    </section>

    <!-- Gespeicherte SAPs -->
    <section id="saved" class="page">

        <h2>
            Gespeicherte SAPs
        </h2>

        <div id="savedList">

        </div>

        <button class="backHome">
            Zurück
        </button>

    </section>

    <!-- Statistik -->
    <section id="stats" class="page">

        <h2>
            Statistik
        </h2>

        <div class="statsBox">

            <p>
                Prüfungen:
                <span id="statCount">0</span>
            </p>

            <p>
                Durchschnitt:
                <span id="statAverage">0 %</span>
            </p>

            <p>
                Bestanden:
                <span id="statPassed">0</span>
            </p>

            <p>
                Nicht bestanden:
                <span id="statFailed">0</span>
            </p>

        </div>

        <button class="backHome">

            Zurück

        </button>

    </section>

</main>

<script src="questions.js"></script>
<script src="generator.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>

</body>
</html>
