<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SAP Prüfungsgenerator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>SAP Prüfungsgenerator</h1>

</header>

<main>

    <div class="questionBox">

        <div class="top">

            <input
                id="studentName"
                type="text"
                placeholder="Name des Prüflings">

            <div id="counter">
                Frage 0 / 0
            </div>

        </div>

        <h3 id="category"></h3>

        <div id="situation"
             style="display:block;
                    margin:20px 0;
                    padding:15px;
                    background:#eef5ff;
                    border-left:5px solid #0b2d57;">
        </div>

        <h2 id="question"></h2>

        <div id="checkboxes"></div>

        <div id="answer"
             style="display:none;
                    margin-top:25px;
                    padding:20px;
                    background:#e8ffe8;
                    border-left:5px solid green;
                    white-space:pre-line;">
        </div>

    </div>

    <div class="navigation">

        <button onclick="startExam()">
            Neue SAP
        </button>

        <button onclick="showAnswer()">
            Musterlösung anzeigen
        </button>

        <button onclick="nextQuestion()">
            Nächste Frage →
        </button>

    </div>

</main>

<script src="questions.js"></script>
<script src="generator.js"></script>
<script src="app.js"></script>

</body>

</html>
